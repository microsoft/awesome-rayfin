apiVersion: v1
metadata:
  name: awesome-rayfin
  displayName: Awesome Rayfin Templates
  description: Community-curated template gallery for Project Rayfin
entries:
  - path: templates/field-technician
    name: Field Technician App
    description: Field service management app with role-based dashboards for dispatchers and technicians, job tracking, customer lookup, and dual-mode auth (local password + Fabric)
  - path: templates/ibcs-trainer
    name: IBCS Trainer
    description: HTML5 Canvas platformer that teaches IBCS chart rules level by level, embedded in a Fabric-authenticated Rayfin app; each play-through is persisted to a typed GameStats entity
  - path: templates/pbi-fixer
    name: Power BI Fixer
    description: Fabric-authenticated workspace that inspects, documents, and fixes Power BI semantic models and reports — a best-practice analyzer with one-click and batch fixes, a report explorer with PBIR diffs, AI-assisted metadata cleanup, and a free IBCS visual, all powered server-side by Fabric User Data Functions
  - path: templates/slide-deck
    name: Slide Deck
    description: Interactive slide deck presenter with sessions, live slide tracking, and audience chat
  - path: templates/todo-local-experimental
    name: '[Experimental] Todo app with full local dev'
    description: End-to-end todo CRUD with username/password auth, a Rayfin data model, and Docker local development — a working starter that exercises the full data path without Fabric
