apiVersion: v1
metadata:
  name: awesome-rayfin
  displayName: Awesome Rayfin Templates
  description: Community-curated template gallery for Project Rayfin
entries:
  - path: templates/events-app
    name: Events App
    description: Events management app with scheduling, listings, and Fabric authentication
  - path: templates/field-engineer
    name: Field Engineer
    description: Field engineer task management app with Fabric authentication, data tracking, and React + Vite
  - path: templates/static-blankapp
    name: Blank App
    description: Bare-bones Rayfin app with authentication, but without any JS or CSS framework and a tiny TypeScript entry point
  - path: templates/todo-local-experimental
    name: "[Experimental] Todo app with full local dev"
    description: Full-stack todo app with categories, auth, and Docker local development
