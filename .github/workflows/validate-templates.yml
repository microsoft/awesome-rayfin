name: Validate Templates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate template metadata
        run: |
          errors=0
          for dir in templates/*/; do
            pkg="$dir/package.json"
            if [ ! -f "$pkg" ]; then
              echo "❌ $dir is missing package.json"
              errors=$((errors + 1))
              continue
            fi

            name=$(node -e "const p=require('./$pkg'); console.log(p.template?.name || '')")
            displayName=$(node -e "const p=require('./$pkg'); console.log(p.template?.displayName || '')")
            description=$(node -e "const p=require('./$pkg'); console.log(p.template?.description || '')")

            if [ -z "$name" ] || [ -z "$displayName" ] || [ -z "$description" ]; then
              echo "❌ $pkg missing template.name, template.displayName, or template.description"
              errors=$((errors + 1))
            else
              echo "✅ $dir → $displayName"
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::$errors template(s) have invalid metadata"
            exit 1
          fi

      - name: Check generated files are up to date
        run: node scripts/generate-manifest.mjs --check

      - name: Scaffold each template
        run: |
          npm install -g @microsoft/rayfin-cli

          # Read template display names from each template package
          entries=$(node -e "
            const fs = require('fs');
            const path = require('path');
            const names = fs.readdirSync('templates')
              .map((dir) => path.join('templates', dir, 'package.json'))
              .filter((pkgPath) => fs.existsSync(pkgPath))
              .map((pkgPath) => require(path.resolve(pkgPath)).template?.displayName)
              .filter(Boolean);
            names.forEach(n => console.log(n));
          ")

          errors=0
          while IFS= read -r name; do
            dir=$(mktemp -d)
            echo "📦 Scaffolding '$name' into $dir..."
            if rayfin init "$dir" -t "$(pwd)" --template-name "$name" --overwrite 2>&1; then
              echo "✅ $name scaffolded successfully"

              # Verify package.json exists in output
              if [ ! -f "$dir/package.json" ]; then
                echo "❌ $name scaffold output is missing package.json"
                errors=$((errors + 1))
              fi
            else
              echo "❌ $name failed to scaffold"
              errors=$((errors + 1))
            fi
            rm -rf "$dir"
          done <<< "$entries"

          if [ $errors -gt 0 ]; then
            echo "::error::$errors template(s) failed scaffold test"
            exit 1
          fi

  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect touched templates
        id: detect-templates
        run: |
          set -euo pipefail
          NULL_SHA='0000000000000000000000000000000000000000'

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [ -z "$base_sha" ] || [ "$base_sha" = "$NULL_SHA" ]; then
              if git rev-parse HEAD~1 >/dev/null 2>&1; then
                base_sha=$(git rev-parse HEAD~1)
              else
                base_sha="$head_sha"
              fi
            fi
          fi

          templates=$(git diff --name-only "$base_sha" "$head_sha" -- 'templates/**' \
            | awk -F/ '/^templates\/[^/]+\// {print $2}' \
            | sort -u)

          {
            echo "templates<<EOF"
            echo "$templates"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$templates" ]; then
            echo "🧪 Touched templates: $(echo "$templates" | tr '\n' ' ')"
          else
            echo "✅ No templates changed; skipping lint/build/test."
          fi

      - name: Lint, build, and test touched templates
        if: steps.detect-templates.outputs.templates != ''
        run: |
          set -euo pipefail
          while IFS= read -r template; do
            if [ -z "$template" ]; then
              continue
            fi

            if [ ! -f "templates/$template/package.json" ]; then
              echo "⏭️ Skipping templates/$template (no package.json found)"
              continue
            fi

            echo "🔎 Validating templates/$template"
            (
              cd "templates/$template"
              npm install
              npm run lint
              npm run build
              npm test
            )
          done <<< "${{ steps.detect-templates.outputs.templates }}"
