name: Bug in Existing Template
description: Report a bug or issue in one of the gallery templates
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide enough detail so we can
        reproduce and fix the issue.

  - type: dropdown
    id: template
    attributes:
      label: Affected template
      description: Which template has the bug?
      options:
        - Events App
        - Field Engineer
        - Other / multiple
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs. what actually happened?
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `rayfin init -t awesome-rayfin --template-name "Events App"`
        2. Run `npm install && npm run dev`
        3. Navigate to ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser, Rayfin CLI version, etc.
      placeholder: |
        - Node: 22.x
        - OS: macOS 15
        - Rayfin CLI: 0.5.0
        - Browser: Chrome 130

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant error output or attach screenshots.
      render: shell
