let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(freq, dur, type='square', vol=0.08) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
}

// ===== IBCS RULES (per level) =====
// Each level pits two look-alike walking chart monsters against each other:
//   enemyKind = the bad-practice chart to STOMP (kill);  good = the correct chart to TOUCH (bonus).
// They look identical apart from the IBCS notation drawn on them \u2014 read the chart, apply the rule.
const IBCS_RULES = {
  1: {enemyKind:'pie',        good:'column',     slogan:'No pie charts \u2014 stomp the round pies, collect the proper columns.'},
  2: {enemyKind:'barOutline', good:'barSolid',   slogan:'Actual values are SOLID \u2014 collect solid bars, stomp the hollow ones.'},
  3: {enemyKind:'barSolid',   good:'barOutline', slogan:'Plan values are OUTLINED \u2014 collect outlined bars, stomp the solid ones.'},
  4: {enemyKind:'barSolid',   good:'barHatched', slogan:'Forecast is HATCHED \u2014 collect hatched bars, stomp the solid ones.'},
  5: {enemyKind:'barDark',    good:'barLight',   slogan:'Previous year is LIGHT GREY \u2014 collect light bars, stomp the dark ones.'},
  6: {enemyKind:'bigNumber',  good:'deviation',  slogan:'Show DEVIATIONS, not plain big numbers \u2014 collect the +/\u2212 charts.'},
  7: {enemyKind:'meceBad',    good:'meceGood',   slogan:'Make it MECE \u2014 collect clean splits, stomp the overlaps & gaps.'},
  8: {enemyKind:'clutter',    good:'clean',      slogan:'Simplify \u2014 stomp the cluttered charts, collect the clean ones.'},
  9: {enemyKind:'axisBreak',  good:'axisFull',   slogan:'No axis breaks \u2014 stomp broken axes, collect full-scale charts.'},
};
function ibcsRule(lvl){
  if(IBCS_RULES[lvl])return IBCS_RULES[lvl];
  const keys=Object.keys(IBCS_RULES);
  return IBCS_RULES[keys[(lvl-1)%keys.length]];
}
const RULE_LEARNED = {
  1:'Pie charts are out \u2192 use columns/bars',
  2:'Actual values = solid fill',
  3:'Plan values = outlined bars',
  4:'Forecast = hatched bars',
  5:'Previous year = light grey',
  6:'Show deviations, not big numbers',
  7:'Structure data MECE',
  8:'Simplify \u2014 cut the clutter',
  9:'No axis breaks \u2014 start at zero',
};

// ===== CHART GLYPH DRAWING =====
// Draws the chart picture itself inside (x,y,w,h). Shared by enemies & collectibles.
function pieSlices(cx,cy,r,cols,vals){
  let a=-Math.PI/2;const tot=vals.reduce((s,v)=>s+v,0);
  for(let i=0;i<vals.length;i++){const a2=a+vals[i]/tot*Math.PI*2;
    ctx.fillStyle=cols[i%cols.length];ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a,a2);ctx.closePath();ctx.fill();a=a2;}
}
// Vertical columns helper: calls draw(bx,by,bw,bh,i) for each bar.
function vBars(x,y,w,h,vals,draw){
  const bw=(w-2)/vals.length-2;
  for(let i=0;i<vals.length;i++){const bx=x+i*(bw+2),bh=Math.max(2,h*vals[i]),by=y+h-bh;draw(bx,by,Math.max(2,bw),bh,i);}
}
// Diagonal hatch fill clipped to a rect (forecast notation).
function hatchRect(bx,by,bw,bh,col){
  ctx.save();ctx.beginPath();ctx.rect(bx,by,bw,bh);ctx.clip();
  ctx.strokeStyle=col;ctx.lineWidth=1;
  for(let d=-bh;d<bw;d+=3){ctx.beginPath();ctx.moveTo(bx+d,by+bh);ctx.lineTo(bx+d+bh,by);ctx.stroke();}
  ctx.restore();
}
function drawChartGlyph(kind,x,y,w,h){
  const cx=x+w/2, cy=y+h/2;
  const vals=[0.5,0.82,0.42,1.0,0.66];
  switch(kind){
    case 'pie':{
      const r=Math.min(w,h)/2;
      pieSlices(cx,cy,r,['#e23b3b','#3b6fe2','#37a76a','#e2a93b','#8e5bd0'],[3,2,2,1.5,1.5]);
      sCir(cx,cy,r,'#ffffff',1);return;
    }
    case 'line':{
      dLine(x,y+h,x+w,y+h,'#9aa3b0',1.2);dLine(x,y,x,y+h,'#9aa3b0',1.2);
      const pts=[[x,y+h*0.7],[x+w*0.25,y+h*0.4],[x+w*0.5,y+h*0.55],[x+w*0.75,y+h*0.18],[x+w,y+h*0.32]];
      ctx.strokeStyle='#2b6fe2';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();return;
    }
    case 'bar':{ // horizontal bars
      const hv=[0.9,0.6,0.78,0.45];const bh=(h-2)/hv.length-2;
      for(let i=0;i<hv.length;i++){const by=y+i*(bh+2);fRect(x,by,Math.max(2,w*hv[i]),Math.max(2,bh),'#4a5160');}
      return;
    }
    // ---- IBCS notation columns ----
    case 'barSolid':   // actual values = solid fill
      vBars(x,y,w,h,vals,(bx,by,bw,bh)=>fRect(bx,by,bw,bh,'#4a5160'));return;
    case 'barOutline': // plan values = outlined / hollow
      vBars(x,y,w,h,vals,(bx,by,bw,bh)=>{fRect(bx,by,bw,bh,'#fdfdfd');ctx.strokeStyle='#4a5160';ctx.lineWidth=1.3;ctx.strokeRect(bx,by,bw,bh);});return;
    case 'barHatched': // forecast = hatched
      vBars(x,y,w,h,vals,(bx,by,bw,bh)=>{fRect(bx,by,bw,bh,'#eef1f5');ctx.strokeStyle='#4a5160';ctx.lineWidth=1.1;ctx.strokeRect(bx,by,bw,bh);hatchRect(bx,by,bw,bh,'#4a5160');});return;
    case 'barLight':   // previous year = light grey
      vBars(x,y,w,h,vals,(bx,by,bw,bh)=>fRect(bx,by,bw,bh,'#b8bec8'));return;
    case 'barDark':    // wrong: heavy near-black
      vBars(x,y,w,h,vals,(bx,by,bw,bh)=>fRect(bx,by,bw,bh,'#23272e'));return;
    case 'bigNumber':{ // plain big number (bad)
      dText('1.2M',Math.max(8,Math.min(h*0.9,13)),cx,cy,'#3a3f4a',true,false,true);return;
    }
    case 'deviation':{ // deviation bars around a zero line (good)
      const dv=[0.6,-0.35,0.45,-0.7,0.3];
      dLine(x,cy,x+w,cy,'#9aa3b0',1);
      const bw=(w-2)/dv.length-2;
      for(let i=0;i<dv.length;i++){const bx=x+i*(bw+2),bh=Math.abs(dv[i])*(h/2);
        const by=dv[i]>=0?cy-bh:cy;fRect(bx,by,Math.max(2,bw),Math.max(1,bh),dv[i]>=0?'#37a76a':'#e23b3b');}
      return;
    }
    case 'meceGood':{ // clean non-overlapping stacked column
      const segs=[0.3,0.25,0.25,0.2];const cols=['#4a5160','#6b7280','#868d9b','#a8aeb8'];
      const bwc=w*0.5,bx=cx-bwc/2;let yy=y+h;
      for(let i=0;i<segs.length;i++){const sh=h*segs[i];yy-=sh;fRect(bx,yy,bwc,sh,cols[i]);}
      ctx.strokeStyle='#2b2f38';ctx.lineWidth=1;ctx.strokeRect(bx,y,bwc,h);return;
    }
    case 'meceBad':{ // overlapping segments + a gap (bad)
      const bwc=w*0.5,bx=cx-bwc/2;
      ctx.save();ctx.globalAlpha=0.6;
      fRect(bx,y+h*0.08,bwc,h*0.42,'#e23b3b');
      fRect(bx,y+h*0.34,bwc,h*0.42,'#3b6fe2'); // overlaps the red
      fRect(bx,y+h*0.82,bwc,h*0.22,'#e2a93b'); // gap above
      ctx.restore();return;
    }
    case 'clutter':{ // busy chart: background, gridlines, 3D, rainbow (bad)
      fRect(x,y,w,h,'#e8edf2');
      for(let gy=y;gy<=y+h;gy+=Math.max(3,h/4))dLine(x,gy,x+w,gy,'#c0c8d0',0.5);
      const pal=['#e23b3b','#3b6fe2','#37a76a','#e2a93b','#8e5bd0'];
      const bw=(w-2)/vals.length-2;
      for(let i=0;i<vals.length;i++){const bx=x+i*(bw+2),bh=h*vals[i],by=y+h-bh;
        fRect(bx,by,Math.max(2,bw),bh,pal[i]);
        fPoly([[bx+bw,by],[bx+bw+2,by-2],[bx+bw+2,y+h-2],[bx+bw,y+h]],'rgba(0,0,0,0.22)');}
      ctx.strokeStyle='#9aa3b0';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);return;
    }
    case 'clean':{ // minimal columns + thin baseline (good)
      dLine(x,y+h,x+w,y+h,'#c0c8d0',1);
      vBars(x,y,w,h,vals,(bx,by,bw,bh)=>fRect(bx,by,bw,bh,'#4a5160'));return;
    }
    case 'axisBreak':{ // bars on a broken/truncated axis (bad)
      const brk=y+h-4;const bw=(w-2)/vals.length-2;
      for(let i=0;i<vals.length;i++){const bh=h*vals[i]*0.7;fRect(x+i*(bw+2),brk-bh,Math.max(2,bw),Math.max(2,bh),'#4a5160');}
      ctx.strokeStyle='#e23b3b';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(x,brk);ctx.lineTo(x+3,brk-2);ctx.lineTo(x+6,brk+2);ctx.lineTo(x+9,brk-2);ctx.lineTo(x+w,brk);ctx.stroke();return;
    }
    case 'axisFull':{ // full axis from zero (good)
      dLine(x,y+h,x+w,y+h,'#9aa3b0',1);dLine(x,y,x,y+h,'#9aa3b0',1);
      vBars(x,y,w,h,vals,(bx,by,bw,bh)=>fRect(bx,by,bw,bh,'#37a76a'));return;
    }
  }
  // column-based kinds: column / colorful / mono / generic 'chart'
  let palette;
  if(kind==='colorful')   palette=['#e23b3b','#3b6fe2','#37a76a','#e2a93b','#8e5bd0'];
  else if(kind==='mono')  palette=['#2b2f38','#5a6170','#868d9b','#3a3f4a','#6b7280'];
  else                    palette=['#4a5160'];
  vBars(x,y,w,h,vals,(bx,by,bw,bh,i)=>fRect(bx,by,bw,bh,palette[i%palette.length]));
}
// Draws a chart monster (body + glyph + googly eyes + little feet) within (ox,oy,w,h).
// Pie charts get a ROUND body; everything else sits on a square index card.
function drawChartMonster(kind,ox,oy,w,h,frame,f){
  const fb=Math.abs(Math.sin(frame))*1.5;
  fEll(ox+4,oy+h-4+fb,8,5,'#3a3f4a');fEll(ox+w-12,oy+h-4-fb,8,5,'#3a3f4a');
  const ed=f>=0?1.2:-1.2;
  if(kind==='pie'){
    const cx=ox+w/2, cy=oy+(h-4)/2, r=Math.min(w-4,h-6)/2;
    pieSlices(cx,cy,r,['#e23b3b','#3b6fe2','#37a76a','#e2a93b','#8e5bd0'],[3,2,2,1.5,1.5]);
    sCir(cx,cy,r,'#5a6678',1.5);
    const ey=cy-r*0.35;
    fCir(cx-6,ey,3.6,'#fff');fCir(cx+6,ey,3.6,'#fff');
    fCir(cx-6+ed,ey,1.7,'#1a1a1a');fCir(cx+6+ed,ey,1.7,'#1a1a1a');
    sCir(cx-6,ey,3.6,'#5a6678',0.8);sCir(cx+6,ey,3.6,'#5a6678',0.8);
    return;
  }
  fRRect(ox+1,oy,w-2,h-4,4,'#fdfdfd');
  ctx.strokeStyle='#5a6678';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(ox+1,oy,w-2,h-4,4);ctx.stroke();
  drawChartGlyph(kind,ox+4,oy+11,w-8,h-19);
  fCir(ox+11,oy+7,3.6,'#fff');fCir(ox+w-11,oy+7,3.6,'#fff');
  fCir(ox+11+ed,oy+7,1.7,'#1a1a1a');fCir(ox+w-11+ed,oy+7,1.7,'#1a1a1a');
  sCir(ox+11,oy+7,3.6,'#5a6678',0.8);sCir(ox+w-11,oy+7,3.6,'#5a6678',0.8);
}

    this.livesLeft=p.lives; this.finalForm=p.form; this.levelReached=currentLevel;

  toJSON(){
    return {
      player_name:playerName||'Player',
      timestamp:new Date(this.startTime).toISOString(),
      duration_seconds:Math.round((this.endTime-this.startTime)/1000*10)/10,

// ----- Cheat codes -----
// 1) Press L then type a level number (1-16) to jump there (commits on Enter, 2nd digit, or short pause).
// 2) Type "leben" while playing to refill all lost lives.
let cheatLevelMode=false, cheatLevelBuf='', cheatLevelTO=null, cheatWord='';
let cheatMsg='', cheatMsgTimer=0;
function armCheatTimeout(){if(cheatLevelTO)clearTimeout(cheatLevelTO);cheatLevelTO=setTimeout(commitCheatLevel,700);}
function commitCheatLevel(){if(cheatLevelTO){clearTimeout(cheatLevelTO);cheatLevelTO=null;}if(cheatLevelBuf)jumpToLevel(parseInt(cheatLevelBuf,10));cheatLevelMode=false;cheatLevelBuf='';}
function handleCheatKey(e){
  if(state!=='playing'&&state!=='levelcomplete'){cheatLevelMode=false;cheatLevelBuf='';return;}
  const k=e.key;
  if(k==='l'||k==='L'){cheatLevelMode=true;cheatLevelBuf='';armCheatTimeout();}
  else if(cheatLevelMode&&k>='0'&&k<='9'){cheatLevelBuf+=k;armCheatTimeout();if(cheatLevelBuf.length>=2)commitCheatLevel();}
  else if(cheatLevelMode&&k==='Enter'){commitCheatLevel();}
  else if(cheatLevelMode){cheatLevelMode=false;cheatLevelBuf='';}
  if(/^[a-zA-Z]$/.test(k)){
    cheatWord=(cheatWord+k.toLowerCase()).slice(-8);
    if(cheatWord.endsWith('leben')&&player){
      player.lives=player.maxLives;cheatWord='';sfxItem();
      cheatMsg='LEBEN \u2014 lives restored';cheatMsgTimer=120;
    }
  }
}

// ===== HELPERS =====
const {sin,cos,PI,floor,round,abs,max,min,sqrt,random,atan2}=Math;
const TAU=PI*2;
const rnd=(a,b)=>floor(random()*(b-a+1))+a;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>max(lo,min(hi,v));

class Rect {
  constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;}
  get l(){return this.x;} get r(){return this.x+this.w;} get t(){return this.y;} get b(){return this.y+this.h;}
  get cx(){return this.x+this.w/2;} get cy(){return this.y+this.h/2;}
  set l(v){this.x=v;} set r(v){this.x=v-this.w;} set t(v){this.y=v;} set b(v){this.y=v-this.h;}
  hit(o){return this.x<o.x+o.w&&this.x+this.w>o.x&&this.y<o.y+o.h&&this.y+this.h>o.y;}
}

const particles=[];
class Particle {
  constructor(x,y,vx,vy,life,r,col,grav=0,shrink=true){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.life=life;this.maxLife=life;this.r=r;this.col=col;
    this.grav=grav;this.shrink=shrink;this.dead=false;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.grav;this.life--;if(this.life<=0)this.dead=true;}
  draw(cam){
    const a=this.life/this.maxLife,r=this.shrink?this.r*a:this.r;
    ctx.globalAlpha=a*0.8;ctx.fillStyle=this.col;
    ctx.beginPath();ctx.arc(this.x-cam,this.y,max(r,0.5),0,TAU);ctx.fill();ctx.globalAlpha=1;
  }
}
function emit(x,y,count,spread,speed,life,r,col,grav=0){
  for(let i=0;i<count;i++){
    const a=random()*TAU,s=random()*speed;
    particles.push(new Particle(x,y,cos(a)*s*spread,sin(a)*s-random()*speed*0.5,life+rnd(-5,5),r+random()*r*0.5,col,grav));
  }
}

let shakeX=0,shakeY=0,shakeT=0;
function shake(intensity,dur){shakeT=dur;shakeX=intensity;shakeY=intensity;}

// ===== DRAW PRIMITIVES =====
function radGrad(x,y,r1,r2,c1,c2){const g=ctx.createRadialGradient(x,y,r1,x,y,r2);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
function linGrad(x1,y1,x2,y2,stops){const g=ctx.createLinearGradient(x1,y1,x2,y2);for(const[s,c]of stops)g.addColorStop(s,c);return g;}
function fRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function fRRect(x,y,w,h,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}
function fEll(x,y,w,h,c){ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,max(w/2,0.1),max(h/2,0.1),0,0,TAU);ctx.fill();}
function sEll(x,y,w,h,c,lw=1){ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,max(w/2,0.1),max(h/2,0.1),0,0,TAU);ctx.stroke();}
function fCir(px,py,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(px,py,max(r,0.1),0,TAU);ctx.fill();}
function sCir(px,py,r,c,lw=1){ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.arc(px,py,max(r,0.1),0,TAU);ctx.stroke();}
function fPoly(pts,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill();}
function dLine(x1,y1,x2,y2,c,lw=1){ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function drawShadow(x,y,w,h){ctx.save();ctx.globalAlpha=0.2;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x+w/2,y+h,w/2+4,6,0,0,TAU);ctx.fill();ctx.restore();}
function dText(text,size,x,y,col,center=false,shadow=false,bold=false){
  ctx.font=(bold?'bold ':'')+size+'px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign=center?'center':'left';ctx.textBaseline=center?'middle':'top';
  if(shadow){ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(text,x+2,y+2);}
  ctx.fillStyle=col;ctx.fillText(text,x,y);
}

// ===== PLAYER =====
class Player {
  constructor(x,y){
    this.rect=new Rect(x,y,PW,PH);this.vy=0;this.onGround=false;
    this.lives=3;this.maxLives=3;this.score=0;
    this.facingRight=true;this.form='sparky';
    this.atkTimer=0;this.atkCd=0;this.atkRect=null;
    this.guitarAtkTimer=0;this.guitarAtkCd=0;this.guitarAtkRect=null;
    this.runFrame=0;this.invincible=0;this.dustTimer=0;
    this.flyCharges=0;this.maxFlyCharges=0;
  }
  update(plats){
    let dx=0;
    if(keys.ArrowLeft||keys.KeyA){dx=-PLAYER_SPEED;this.facingRight=false;}
    if(keys.ArrowRight||keys.KeyD){dx=PLAYER_SPEED;this.facingRight=true;}
    if((keys.Space||keys.ArrowUp||keys.KeyW)&&this.onGround){
      this.vy=JUMP_FORCE;this.onGround=false;sfxJump();stats.jumps++;
      emit(this.rect.cx,this.rect.b,5,0.8,2,15,3,'rgba(255,255,255,0.6)',0.05);
    }
    const fd=FORM_DATA[this.form];
    if(keys.KeyX&&fd&&fd.fly>0&&this.flyCharges>0){
      this.vy=JUMP_FORCE*0.7;this.flyCharges--;this.onGround=false;keys.KeyX=false;
      playTone(500+(this.maxFlyCharges-this.flyCharges)*60,0.08,'sine',0.04);
      emit(this.rect.cx,this.rect.b,4,1,1.5,12,2,'rgba(160,100,220,0.6)',0.03);
    }
    if(this.onGround){this.maxFlyCharges=fd?fd.fly:0;this.flyCharges=this.maxFlyCharges;}
    this.vy+=GRAVITY;
    this.rect.x+=dx;this._cx(dx,plats);
    this.rect.y+=floor(this.vy);this._cy(plats);
    if(this.atkCd>0)this.atkCd--;
    if(this.atkTimer>0){this.atkTimer--;
      this.atkRect=this.facingRight?new Rect(this.rect.r,this.rect.cy-ATK_H/2,ATK_W,ATK_H)
        :new Rect(this.rect.l-ATK_W,this.rect.cy-ATK_H/2,ATK_W,ATK_H);
    }else this.atkRect=null;
    if(this.guitarAtkCd>0)this.guitarAtkCd--;
    if(this.guitarAtkTimer>0){this.guitarAtkTimer--;
      const gw=ATK_W*1.5,gh=ATK_H*1.3;
      this.guitarAtkRect=this.facingRight?new Rect(this.rect.r,this.rect.cy-gh/2,gw,gh)
        :new Rect(this.rect.l-gw,this.rect.cy-gh/2,gw,gh);
    }else this.guitarAtkRect=null;
    if(this.invincible>0)this.invincible--;
    if(dx!==0)this.runFrame+=0.25;else this.runFrame=0;
    if(abs(dx)>0&&this.onGround){this.dustTimer++;
      if(this.dustTimer%5===0)emit(this.rect.cx-(this.facingRight?8:-8),this.rect.b-2,1,0.5,1,12,2,'rgba(180,160,120,0.5)',-0.02);
    }else this.dustTimer=0;
  }
  attack(){
    if(this.atkCd>0||this.atkTimer>0)return;
    this.atkTimer=ATK_DUR;this.atkCd=ATK_CD;stats.attacks++;
    const a=(FORM_DATA[this.form]||{}).atk||'wave';
    if(a==='thunder')sfxThunder();else if(a==='fire')sfxFire();else if(a==='water')sfxWater();else sfxWave();
  }
  guitarAttack(){
    if(this.guitarAtkCd>0||this.guitarAtkTimer>0)return;
    this.guitarAtkTimer=28;this.guitarAtkCd=45;stats.attacks++;
    sfxGuitar();
  }
  _cx(dx,ps){for(const p of ps)if(this.rect.hit(p)){if(dx>0)this.rect.r=p.l;else if(dx<0)this.rect.l=p.r;}}
  _cy(ps){this.onGround=false;for(const p of ps)if(this.rect.hit(p)){if(this.vy>0){this.rect.b=p.t;this.vy=0;this.onGround=true;}else if(this.vy<0){this.rect.t=p.b;this.vy=0;}}}

  draw(cam,tick){
    if(this.invincible>0&&floor(this.invincible/3)%2===0)return;
    const x=this.rect.x-cam,y=this.rect.y;
    drawShadow(x,y,PW,PH);
    ctx.save();ctx.translate(x+PW/2,y+PH);ctx.scale(this.facingRight?1:-1,1);ctx.translate(-PW/2,-PH);
    this._dAnalyst(tick);
    ctx.restore();
    if(this.atkTimer>0&&this.atkRect){
      const a=(FORM_DATA[this.form]||{}).atk||'wave';
      if(a==='thunder')this._drawThunder(cam,tick);
      else if(a==='fire')this._drawFire(cam,tick);
      else if(a==='water')this._drawWaterAtk(cam,tick);
      else this._drawWave(cam,tick);
    }
    if(this.guitarAtkTimer>0&&this.guitarAtkRect)this._drawGuitar(cam,tick);
  }

  // ===== ATTACK: ELECTRIC GUITAR (for bosses) =====
  _drawGuitar(cam,tick){
    const prog=1-this.guitarAtkTimer/28,swing=sin(prog*PI)*30;
    const gx=this.guitarAtkRect.x-cam+(this.facingRight?20:-20),gy=this.guitarAtkRect.cy-20;
    ctx.save();
    ctx.translate(gx,gy);
    ctx.rotate((this.facingRight?1:-1)*(swing*PI/180));
    // Guitar body (V-shape)
    ctx.fillStyle=linGrad(-15,-10,15,10,[[0,'#1a1a2e'],[0.5,'#2a2a3e'],[1,'#1a1a2e']]);
    ctx.beginPath();
    ctx.moveTo(0,-18);ctx.lineTo(-12,0);ctx.lineTo(-10,8);ctx.lineTo(10,8);ctx.lineTo(12,0);ctx.closePath();
    ctx.fill();
    // Pickups
    fRect(-6,-2,3,6,'#c0c0c0');fRect(3,-2,3,6,'#c0c0c0');
    // Strings
    for(let i=0;i<6;i++){const sy=-12+i*4;
      dLine(-10,sy,10,sy,'rgba(200,200,200,0.6)',0.5);}
    // Neck
    fRect(-2,-18,4,10,'#5a4030');
    // Headstock
    fRect(-4,-24,8,6,linGrad(-4,-24,4,-18,[[0,'#3a2820'],[1,'#5a4030']]));
    // Tuning pegs
    for(let i=0;i<3;i++){fCir(-3,-22+i*2,1,'#808080');fCir(3,-22+i*2,1,'#808080');}
    // Lightning/energy effect
    ctx.globalAlpha=0.7*(1-prog);
    for(let i=0;i<8;i++){
      const ex=random()*24-12,ey=random()*16-8;
      fCir(ex,ey,2+random()*3,'#ffff00');
    }
    // Sound waves
    ctx.strokeStyle='rgba(255,200,0,'+((1-prog)*0.5)+')';
    ctx.lineWidth=2;
    for(let r=10;r<40;r+=10){
      ctx.beginPath();ctx.arc(0,0,r+(prog*20),0,PI*2);ctx.stroke();
    }
    ctx.restore();
    if(prog<0.3&&this.guitarAtkTimer%2===0)
      emit(this.guitarAtkRect.cx,this.guitarAtkRect.cy,3,1.5,2,12,3,'#ffff00',0);
  }

  // ===== ATTACK: THUNDER =====
  _drawThunder(cam,tick){
    const ax=this.atkRect.x-cam,ay=this.atkRect.y,prog=1-this.atkTimer/ATK_DUR,f=this.facingRight?1:-1;
    ctx.save();ctx.globalAlpha=0.15*(1-prog);fRect(ax,ay,ATK_W,ATK_H,'#ffff40');ctx.restore();
    for(let i=0;i<6;i++){let bx=ax+i*(ATK_W/6),by=ay+random()*ATK_H;const pts=[[bx,by]];
      for(let j=0;j<4;j++){bx+=(6+random()*14)*f;by+=-10+random()*20;pts.push([bx,by]);}
      ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let k=1;k<pts.length;k++)ctx.lineTo(pts[k][0],pts[k][1]);ctx.stroke();
      ctx.strokeStyle='#ffff40';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let k=1;k<pts.length;k++)ctx.lineTo(pts[k][0],pts[k][1]);ctx.stroke();}
    if(this.atkTimer%3===0)emit(this.atkRect.cx,this.atkRect.cy,2,1,3,8,2,'#ffff80',0);
  }

  // ===== ATTACK: WAVE (sonic rings) =====
  _drawWave(cam,tick){
    const f=this.facingRight?1:-1,prog=1-this.atkTimer/ATK_DUR;
    const ox=this.rect.cx-cam+f*10,oy=this.rect.cy;
    const fd=FORM_DATA[this.form]||{};
    const hue=fd.color||'#a080d0';
    for(let i=0;i<5;i++){const r=18+prog*90+i*20;const a=max(0,(200-i*35-prog*100)/255);
      if(a>0){ctx.strokeStyle=hue;ctx.globalAlpha=a;ctx.lineWidth=3;ctx.beginPath();ctx.arc(ox,oy,r,0,TAU);ctx.stroke();ctx.globalAlpha=1;}}
    ctx.save();ctx.globalAlpha=0.5*(1-prog);fCir(ox,oy,6+prog*14,hue);ctx.restore();
    if(this.atkTimer%4===0)emit(ox+this.rect.cx-this.rect.cx+cam*0,oy,2,2,2,10,2,hue,0);
  }

  // ===== ATTACK: FIRE (burst) =====
  _drawFire(cam,tick){
    const f=this.facingRight?1:-1,prog=1-this.atkTimer/ATK_DUR;
    const ox=this.rect.cx-cam+f*30,oy=this.rect.cy;
    ctx.save();ctx.globalAlpha=0.2*(1-prog);fCir(ox+f*prog*60,oy,20+prog*30,'#ff4010');ctx.restore();
    for(let i=0;i<8;i++){
      const fx=ox+f*(prog*80+i*10)+sin(tick*0.3+i)*4;
      const fy=oy+sin(tick*0.4+i*0.8)*(4+i*2);
      const fr=6-i*0.5;ctx.globalAlpha=max(0,0.7-prog-i*0.08);
      fCir(fx,fy,fr,i<3?'#ffd040':(i<6?'#ff6020':'#ff3010'));
    }
    ctx.globalAlpha=1;
    if(this.atkTimer%3===0)emit(ox+cam,oy,3,1.5,3,12,3,'#ff8040',0.03);
  }

  // ===== ATTACK: WATER (stream) =====
  _drawWaterAtk(cam,tick){
    const f=this.facingRight?1:-1,prog=1-this.atkTimer/ATK_DUR;
    const ox=this.rect.cx-cam+f*20,oy=this.rect.cy;
    for(let i=0;i<6;i++){
      const wx=ox+f*(prog*70+i*12)+sin(tick*0.3+i)*3;
      const wy=oy+sin(tick*0.5+i*1.2)*5;
      const wr=5-i*0.4;ctx.globalAlpha=max(0,0.6-prog*0.3-i*0.06);
      fCir(wx,wy,wr,i<2?'#a0e0ff':(i<4?'#50b0e0':'#2080c0'));
    }
    ctx.globalAlpha=1;ctx.save();ctx.globalAlpha=0.15*(1-prog);fCir(ox+f*prog*40,oy,15,'#60c0ff');ctx.restore();
    if(this.atkTimer%3===0)emit(ox+cam,oy,2,1,3,10,2,'#80d0ff',0.02);
  }
}

class Dragon {

// ===== BOSS =====
class Boss {
  constructor(x,y,lb,rb,team){
    this.rect=new Rect(x,y,50,60);this.lb=lb;this.rb=rb;
    this.speed=1.2;this.alive=true;this.hp=5;this.maxHp=5;
    this.team=team;this.hitTimer=0;this.frame=0;
  }
  update(){if(!this.alive)return;this.rect.x+=this.speed;if(this.rect.x<=this.lb||this.rect.r>=this.rb)this.speed*=-1;this.frame+=0.08;if(this.hitTimer>0)this.hitTimer--;}
  hit(){if(this.hitTimer>0)return false;this.hp--;this.hitTimer=30;if(this.hp<=0){this.alive=false;return true;}return false;}
  draw(cam,tick){
    if(!this.alive)return;const x=this.rect.x-cam,y=this.rect.y,w=50,h=60,f=this.speed>=0?1:-1;
    if(this.hitTimer>0&&floor(this.hitTimer/3)%2===0)ctx.globalAlpha=0.4;
    ctx.save();ctx.translate(x+w/2,y+h);ctx.scale(f,1);ctx.translate(-w/2,-h);
    if(this.team==='bandit')this._drawBandit();else this._drawShadow();
    ctx.restore();ctx.globalAlpha=1;
    if(this.alive){const bw=40,bh=5;fRect(x+5,y-12,bw,bh,'#333');
      fRect(x+5,y-12,bw*(this.hp/this.maxHp),bh,this.team==='bandit'?'#e02020':'#a040d0');
      fRect(x+5,y-12,bw,1,'rgba(255,255,255,0.3)');}
  }
  _drawBandit(){
    fRect(10,52,12,8,'#1a1a1a');fRect(28,52,12,8,'#1a1a1a');
    fRect(14,40,8,14,'#e8e8e8');fRect(28,40,8,14,'#e8e8e8');
    fEll(8,18,34,26,'#f0f0f0');dText('B',18,25,28,'#e02020',true,false,true);
    fEll(12,2,26,20,'#fdd8b0');fEll(12,-2,26,12,'#4040a0');
    fCir(20,12,3,'#1a1a1a');fCir(30,12,3,'#1a1a1a');fCir(20.5,11.5,1.2,'#fff');fCir(30.5,11.5,1.2,'#fff');
    dLine(20,17,30,17,'#a05040',1.5);
    fEll(3,30,10,8,'#1a1a1a');fEll(37,30,10,8,'#1a1a1a');
  }
  _drawShadow(){
    fRect(10,52,12,8,'#2a2a2a');fRect(28,52,12,8,'#2a2a2a');
    fRect(12,38,12,16,'#303030');fRect(26,38,12,16,'#303030');
    fEll(6,16,38,26,'#1a1a1a');fCir(25,28,8,'#e0e0e0');
    fCir(22,26,2,'#1a1a1a');fCir(28,26,2,'#1a1a1a');dLine(22,30,28,30,'#1a1a1a',1);
    for(let i=0;i<5;i++)sCir(16+i*4,17,2,'#c0c000',1);
    fEll(12,0,26,20,'#e8c890');fRect(12,0,26,8,'#1a1a1a');fPoly([[12,8],[8,14],[12,4]],'#1a1a1a');
    fRect(14,8,10,5,'#2a2a2a');fRect(26,8,10,5,'#2a2a2a');fRect(24,9,2,3,'#404040');
    ctx.strokeStyle='#805040';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(20,16);ctx.quadraticCurveTo(25,19,30,16);ctx.stroke();
    fEll(1,28,10,10,'#e8c890');fEll(39,28,10,10,'#e8c890');
    for(let i=0;i<3;i++){fCir(4+i*3,28,2,'#c0c000');fCir(42+i*3,28,2,'#c0c000');}
  }
}

// ===== LEVEL GENERATOR =====
let currentLevel=1, boss=null, lavaZones=[];

function generateLevel(lvlIdx){
  const cfg=LEVELS[lvlIdx];
  const lvl=lvlIdx+1;const rule=ibcsRule(lvl);
  const plats=[],enemies=[],coins=[],waterZones=[],chartItems=[];
  const sw=max(200,STEP_W-(lvlIdx>8?lvlIdx*3:0));
  const eSpd=cfg.eSpd*ENEMY_SPEED;

  // Start flat
  const startW=max(300,500-lvlIdx*10);
  plats.push(new Rect(0,GROUND,startW,50));
  let x=startW;const lavaArr=[];

  // Hazard gap 1
  if(cfg.hasWater&&!cfg.hasLava){
    const gw=100+lvlIdx*8;waterZones.push(new Water(x,gw,GROUND));
    plats.push(new Rect(x+gw/2-40,GROUND-60,80,15));x+=gw;
  }else if(cfg.hasLava){
    const gw=100+lvlIdx*10;lavaArr.push(new Lava(x,gw,GROUND));
    plats.push(new Rect(x+gw/3-30,GROUND-70,65,15));plats.push(new Rect(x+gw*2/3-30,GROUND-50,65,15));x+=gw;
  }

  // Mid flat
  const midW=max(200,300-lvlIdx*5);plats.push(new Rect(x,GROUND,midW,50));x+=midW;

  // Ascending stairs
  const nSteps=cfg.steps;
  for(let i=0;i<nSteps;i++)plats.push(new Rect(x+i*sw,GROUND-(i+1)*STEP_H,sw,(i+1)*STEP_H+50));

  // Summit
  const sY=GROUND-(nSteps+1)*STEP_H,sLX=x+nSteps*sw,sH=(nSteps+1)*STEP_H+50;
  const sGW=350+lvlIdx*15;
  plats.push(new Rect(sLX,sY,250,sH));
  const sRX=sLX+250+sGW;plats.push(new Rect(sRX,sY,250,sH));

  // Dragon gap
  const dragonSpd=1.5+lvlIdx*0.05;
  const dragon=new Dragon(sLX+250+50,sY+22,sLX+250,sRX,dragonSpd);

  // Descending stairs
  const dSX=sRX+250;
  for(let i=0;i<nSteps;i++)plats.push(new Rect(dSX+i*sw,GROUND-(nSteps-i)*STEP_H,sw,(nSteps-i)*STEP_H+50));

  x=dSX+nSteps*sw;

  // Hazard gap 2
  if(cfg.hasLava&&lvlIdx>6){
    const gw=100+lvlIdx*8;lavaArr.push(new Lava(x,gw,GROUND));
    plats.push(new Rect(x+gw/3,GROUND-60,60,15));plats.push(new Rect(x+gw*2/3,GROUND-90,60,15));x+=gw;
  }else if(cfg.hasWater&&lvlIdx>3){
    const gw=80+lvlIdx*6;waterZones.push(new Water(x,gw,GROUND));
    plats.push(new Rect(x+gw/2-30,GROUND-50,60,15));x+=gw;
  }

  // Boss arena
  const bossW=700+lvlIdx*20;plats.push(new Rect(x,GROUND,bossW,50));

  // Boss
  const bx=x+bossW-300;
  boss=new Boss(bx,GROUND-60,bx-100,bx+180,cfg.boss);
  boss.hp=cfg.bossHp;boss.maxHp=cfg.bossHp;boss.speed=1.2+lvlIdx*0.05;

  // Flag
  const flag=new Flag(x+bossW-100,GROUND);

  // Distribute enemies (avoid gaps)
  const totalW=x+bossW;const eCount=cfg.enemies;
  const eZone=totalW-200;
  // Collect all gap zones to avoid
  const gapZones=[];
  for(const w of waterZones)gapZones.push({l:w.rect.x,r:w.rect.x+w.rect.w});
  for(const lv of lavaArr)gapZones.push({l:lv.rect.x,r:lv.rect.x+lv.rect.w});
  gapZones.push({l:dragon.minX,r:dragon.maxX});
  for(let i=0;i<eCount;i++){
    const ex=150+floor(i*eZone/eCount);
    // Skip if enemy would be in a gap
    let inGap=false;for(const g of gapZones)if(ex>=g.l&&ex<=g.r){inGap=true;break;}
    if(inGap)continue;
    const ey=GROUND-34;
    const lb=max(0,ex-100),rb=min(totalW,ex+150);
    let onPlat=false;
    for(const p of plats){if(ex>=p.x&&ex<=p.x+p.w&&p.t<=GROUND){
      enemies.push(new Enemy(ex,p.t-34,max(p.x,ex-80),min(p.x+p.w,ex+80),eSpd,rule.enemyKind));onPlat=true;break;}}
    if(!onPlat)enemies.push(new Enemy(ex,ey,lb,rb,eSpd,rule.enemyKind));
  }

  // Distribute coins on platforms
  for(const p of plats){
    if(p.w<100||p.t>GROUND)continue;
    const nc=max(1,floor(p.w/120));
    for(let i=0;i<nc;i++){const cx=p.x+40+i*(p.w-80)/max(1,nc-1);coins.push(new Coin(cx,p.t-30));}
  }

  // Distribute "good" IBCS charts \u2014 they WALK like enemies and look the same; touch to collect a bonus.
  if(rule.good){
    for(const p of plats){
      if(p.w<150||p.t>GROUND)continue;
      const gx=p.cx-17;
      chartItems.push(new ChartItem(gx,p.t-34,max(p.x,gx-70),min(p.x+p.w,gx+70),-eSpd,rule.good));
    }
  }

  // Dummy items (forms assigned by level config)
  const foxI=new CollectItem(-100,-100,'',0,'');foxI.collected=true;
  const eggI=new CollectItem(-100,-100,'',0,'');eggI.collected=true;
  const batI=new CollectItem(-100,-100,'',0,'');batI.collected=true;

  // Clouds
  const clouds=[];for(let i=0;i<15;i++)clouds.push(new Cloud(rnd(0,totalW),rnd(30,150),rnd(50,120)));

  lavaZones=lavaArr;
  return{plats,enemies,coins,flag,clouds,water:waterZones,dragon,foxI,eggI,batI,chartItems,slogan:rule.slogan};
}

  // Fly charges
  if(fd.fly>0){for(let i=0;i<player.maxFlyCharges;i++){const fx=W-70-i*16,fy=30;
    if(i<player.flyCharges){fCir(fx,fy,5,fc);ctx.save();ctx.globalAlpha=0.4;fCir(fx-1,fy-1,2,'#fff');ctx.restore();}
    else sCir(fx,fy,5,'rgba(255,255,255,0.2)',1);}
    dText('X',10,W-70-player.maxFlyCharges*16+2,24,fc,false,false,true);}
  // R switch indicator (always available)
  if(unlockedForms.length>1){
    ctx.save();ctx.globalAlpha=0.6+sin(tick*0.08)*0.15;
    fRRect(W/2+140,14,60,30,6,'rgba(255,255,255,0.08)');
    dText('R:Switch',9,W/2+170,29,'#90caf9',true,false,true);ctx.restore();}
  // Cheat code feedback
  if(cheatLevelMode){dText('LEVEL? '+cheatLevelBuf,13,W/2,58,'#ffd700',true,true,true);}
  if(cheatMsgTimer>0){cheatMsgTimer--;
    ctx.save();ctx.globalAlpha=min(1,cheatMsgTimer/30);
    dText(cheatMsg,16,W/2,H-40,'#7fe0a0',true,true,true);ctx.restore();}
}

// ===== GAME STATE =====
let state='title',won=false,tick=0;
let player,plats,enemies,coins,flag,clouds,waterZones,dragon,foxI,eggI,batI,chartItems=[];
let levelSlogan=null,sloganTimer=0;
let camX=0,targetCamX=0,titleAnim=0;
let completeTimer=0,evolutionFrom=null,evolutionTo=null;

function startGame(){
  initAudio();currentLevel=1;stats.reset();
  unlockedForms=['sparky','bigrest'];
  player=new Player(50,H-130);
  player.form=LEVELS[0].form;
  if(!unlockedForms.includes(player.form))unlockedForms.push(player.form);
  loadLevel();
}
function loadLevel(){
  initBgElements();
  const lv=generateLevel(currentLevel-1);
  plats=lv.plats;enemies=lv.enemies;coins=lv.coins;flag=lv.flag;clouds=lv.clouds;
  waterZones=lv.water;dragon=lv.dragon;foxI=lv.foxI;eggI=lv.eggI;batI=lv.batI;
  chartItems=lv.chartItems;levelSlogan=lv.slogan;sloganTimer=lv.slogan?390:0;
  tick=0;won=false;state='playing';atkQueued=false;guitarAtkQueued=false;camX=0;particles.length=0;
  player.rect.x=50;player.rect.y=H-130;player.vy=0;
  const fd=FORM_DATA[player.form]||{};
  player.maxFlyCharges=fd.fly||0;player.flyCharges=player.maxFlyCharges;
}
function completeLevel(){
  const cfg=LEVELS[currentLevel-1];const fd=FORM_DATA[cfg.form]||{};
  if(!unlockedForms.includes(cfg.form))unlockedForms.push(cfg.form);
  if(!stats.formsCollected.includes(cfg.form))stats.formsCollected.push(cfg.form);
  if(fd.evolve){
    evolutionFrom=cfg.form;evolutionTo=fd.evolve;
    if(!unlockedForms.includes(fd.evolve))unlockedForms.push(fd.evolve);
    if(!stats.formsCollected.includes(fd.evolve))stats.formsCollected.push(fd.evolve);
  }else{evolutionFrom=null;evolutionTo=null;}
  state='levelcomplete';completeTimer=0;sfxLevelUp();
}
function advanceLevel(){
  if(currentLevel>=16){state='gameover';won=true;stats.finalize(player,true);stats.publish();sfxWin();return;}
  currentLevel++;stats.levelReached=currentLevel;
  const nextCfg=LEVELS[currentLevel-1];
  player.form=nextCfg.form;
  if(!unlockedForms.includes(player.form))unlockedForms.push(player.form);
  const savedScore=player.score,savedLives=player.lives;
  loadLevel();player.score=savedScore;player.lives=savedLives;
}
function jumpToLevel(n){ // cheat: warp to any level, keeping score & lives
  if(state!=='playing'&&state!=='levelcomplete')return;
  n=max(1,min(16,n|0));
  currentLevel=n;stats.levelReached=max(stats.levelReached||1,n);
  const cfg=LEVELS[currentLevel-1];
  player.form=cfg.form;
  if(!unlockedForms.includes(player.form))unlockedForms.push(player.form);
  const savedScore=player.score,savedLives=player.lives;
  loadLevel();player.score=savedScore;player.lives=savedLives;
  cheatMsg='LEVEL '+n;cheatMsgTimer=120;
}
function switchForm(){
  if(unlockedForms.length<=1)return;
  const idx=unlockedForms.indexOf(player.form);
  const next=(idx+1)%unlockedForms.length;
  player.form=unlockedForms[next];
  const fd=FORM_DATA[player.form]||{};
  player.maxFlyCharges=fd.fly||0;player.flyCharges=player.maxFlyCharges;
  sfxItem();
}
function respawn(){player.rect.x=50;player.rect.y=H-130;player.vy=0;player.invincible=90;}

// ===== TITLE SCREEN =====
function drawTitle(tick){
  titleAnim+=0.016;
  fRect(0,0,W,H,linGrad(0,0,0,H,[[0,'#0a1530'],[0.4,'#1a3a6a'],[0.7,'#3a7ab0'],[1,'#70c0e8']]));
  for(let i=0;i<40;i++){const sx=(i*97+sin(titleAnim+i)*10)%W,sy=(i*43)%(H*0.6),sa=0.3+sin(titleAnim*2+i*0.7)*0.3;
    ctx.save();ctx.globalAlpha=sa;fCir(sx,sy,1+(i%3)*0.5,'#fff');ctx.restore();}
  ctx.save();ctx.globalAlpha=0.3;for(let i=0;i<5;i++){const mx=i*200-50,mh=120+sin(i*1.3)*40;fPoly([[mx,H],[mx+100,H-mh],[mx+200,H]],'#1a2a40');}ctx.restore();
  fRect(0,H-60,W,60,linGrad(0,H-60,0,H,[[0,'#388e3c'],[1,'#2e7d32']]));
  const glow=0.3+sin(titleAnim*2)*0.15;
  ctx.save();ctx.shadowColor='#37d67a';ctx.shadowBlur=30*glow;
  dText('MASTER THE RULES',24,W/2,100,'#37d67a',true,true,true);dText('IBCS TRAINER',52,W/2,145,'#fff',true,true,true);ctx.shadowBlur=0;ctx.restore();
  dText('Conquer bad charts — one IBCS rule per level',14,W/2,185,'rgba(55,214,122,0.7)',true,false,true);
  const controls=[['Arrow Keys / WASD','Move'],['Space / Up / W','Jump'],['F','Attack'],['G','Guitar (vs Boss)'],['X','Fly (when available)'],['R','Switch form']];
  let cy=230;
  for(const[key,desc]of controls){fRRect(W/2-180,cy-4,360,26,6,'rgba(255,255,255,0.05)');
    dText(key,14,W/2-10,cy+9,'#90caf9',true,false,true);dText(desc,12,W/2+100,cy+9,'rgba(255,255,255,0.6)',false,false,false);cy+=30;}
  const cta=sin(titleAnim*3)*0.3+0.7;ctx.save();ctx.globalAlpha=cta;dText('Click to enter your name',20,W/2,H-90,'#fff',true,true,true);ctx.restore();
}

// ===== LEVEL COMPLETE SCREEN =====
function drawLevelComplete(tick){
  fRect(0,0,W,H,linGrad(0,0,0,H,[[0,'#1a3020'],[0.5,'#0a2010'],[1,'#0a1008']]));
  // Sparkles
  for(let i=0;i<25;i++){const px=(i*67+completeTimer*0.8)%W,py=(i*41+sin(completeTimer*0.03+i)*40)%H;
    ctx.save();ctx.globalAlpha=0.2+sin(completeTimer*0.05+i)*0.15;fCir(px,py,2+sin(completeTimer*0.04+i)*1,'#ffd700');ctx.restore();}
  ctx.save();ctx.shadowColor='#4caf50';ctx.shadowBlur=20;
  dText('LEVEL '+currentLevel+' COMPLETE!',40,W/2,150,'#4caf50',true,true,true);ctx.shadowBlur=0;ctx.restore();
  dText('Score: '+player.score,24,W/2,220,'#ffd700',true,true,true);
  // Evolution
  if(evolutionFrom&&evolutionTo&&completeTimer>60){
    const fd1=FORM_DATA[evolutionFrom]||{},fd2=FORM_DATA[evolutionTo]||{};
    const prog=min(1,(completeTimer-60)/60);
    // Morphing sparkle ring
    for(let i=0;i<12;i++){const a=i*TAU/12+completeTimer*0.05;
      const r=40+sin(completeTimer*0.08)*10;const sx=W/2+cos(a)*r*prog,sy=340+sin(a)*r*0.5*prog;
      ctx.save();ctx.globalAlpha=prog*0.6;fCir(sx,sy,3,'#fff');ctx.restore();}
    ctx.save();ctx.globalAlpha=min(1,prog*2);
    dText(RULE_LEARNED[currentLevel]?('Rule mastered: '+RULE_LEARNED[currentLevel]):'Skill up!',20,W/2,310,'#37d67a',true,true,true);ctx.restore();
    if(completeTimer===61)sfxEvolve();
  }else if(!evolutionFrom&&completeTimer>60){
    if(RULE_LEARNED[currentLevel])dText('Rule mastered: '+RULE_LEARNED[currentLevel],18,W/2,310,'#37d67a',true,false,true);
    const nextRule=ibcsRule(currentLevel+1);
    if(nextRule.slogan)dText('Next: '+nextRule.slogan,13,W/2,340,'rgba(255,255,255,0.55)',true,false,true);
  }
  if(completeTimer>30)dText('Press any key to continue...',14,W/2,H-60,'rgba(255,255,255,0.5)',true,false,true);
}

// ===== GAME OVER =====
function drawGameOver(tick){
  fRect(0,0,W,H,won?linGrad(0,0,0,H,[[0,'#1a4020'],[1,'#0a2010']]):linGrad(0,0,0,H,[[0,'#2a1020'],[1,'#100810']]));
  for(let i=0;i<20;i++){const px=(i*73+tick*0.5)%W,py=(i*41+sin(tick*0.02+i)*30)%H;
    ctx.save();ctx.globalAlpha=0.1;fCir(px,py,2+sin(tick*0.03+i)*1,won?'#ffd700':'#ff3030');ctx.restore();}
  const msg=won?'YOU WIN!':'GAME OVER';const col=won?'#4caf50':'#f44336';
  ctx.save();ctx.shadowColor=col;ctx.shadowBlur=20;dText(msg,56,W/2,200,col,true,true,true);ctx.shadowBlur=0;ctx.restore();
  dText('Score: '+player.score,28,W/2,280,'#ffd700',true,true,true);
  if(won)dText('Level '+currentLevel+' / 16',18,W/2,320,'rgba(255,255,255,0.6)',true,false,true);
  if(playerName)dText(playerName,16,W/2,350,'rgba(255,255,255,0.5)',true,false,false);
  fRRect(W/2-120,380,240,44,10,'rgba(255,255,255,0.06)');
  dText('R = Restart    Q = Quit',18,W/2,402,'#999',true,false,false);
}

// ===== GAME UPDATE =====
function updateGame(){
  tick++;dragon.update();if(sloganTimer>0)sloganTimer--;
  if(player.onGround&&player.rect.b>=dragon.rect.t&&player.rect.b<=dragon.rect.t+8
    &&player.rect.r>dragon.rect.l&&player.rect.l<dragon.rect.r)player.rect.x+=dragon.speed;
  const allP=plats.concat([dragon.rect]);
  player.update(allP);
  if(atkQueued){player.attack();atkQueued=false;}
  if(guitarAtkQueued){player.guitarAttack();guitarAtkQueued=false;}
  // R-key form switching
  if(keys.KeyR){switchForm();keys.KeyR=false;}
  for(const e of enemies)e.update();
  for(const ci of chartItems)ci.update();
  // Enemy collision
  for(const e of enemies){if(!e.alive)continue;
    if(player.atkRect&&player.atkTimer>0&&e.rect.hit(player.atkRect)){
      e.alive=false;player.score+=100;sfxStomp();stats.enemiesZapped++;
      emit(e.rect.cx,e.rect.cy,15,1,3,20,3,'#ffd700',0.05);shake(3,6);continue;}
    if(player.rect.hit(e.rect)){
      // Bigrest crushes enemies by walking into them
      if(player.form==='bigrest'){
        e.alive=false;player.score+=100;sfxStomp();stats.enemiesStomped++;
        emit(e.rect.cx,e.rect.cy,12,1,2.5,18,3,'#ffd700',0.05);shake(3,6);
      }else if(player.vy>0&&player.rect.b-e.rect.t<22){
        e.alive=false;player.vy=JUMP_FORCE*0.6;player.score+=100;sfxStomp();stats.enemiesStomped++;
        emit(e.rect.cx,e.rect.cy,12,1,2.5,18,3,'#ffd700',0.05);
      }else if(player.invincible<=0){
        player.lives--;sfxHit();shake(5,12);stats.deaths++;stats.enemyDeaths++;
        emit(player.rect.cx,player.rect.cy,10,1,2,15,3,'#ff4040',0.03);
        if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}
        respawn();}}}
  // Coins
  for(const c of coins)if(!c.collected&&player.rect.hit(c.rect)){
    c.collected=true;player.score+=50;sfxCoin();stats.coinsCollected++;
    emit(c.rect.cx,c.rect.cy,8,0.8,2,15,2,'#ffd700',-0.02);}
  // Good IBCS charts to collect
  for(const ci of chartItems)if(!ci.collected&&player.rect.hit(ci.rect)){
    ci.collected=true;player.score+=75;sfxItem();stats.coinsCollected++;
    emit(ci.rect.cx,ci.rect.cy,12,1,2.2,20,2,'#37d67a',-0.03);}
  // Boss
  if(boss&&boss.alive){boss.update();
    if(player.atkRect&&player.atkTimer>0&&boss.rect.hit(player.atkRect)){
      const killed=boss.hit();
      if(killed){player.score+=500;sfxStomp();stats.bossesKilled++;emit(boss.rect.cx,boss.rect.cy,25,1.5,4,25,4,'#ffd700',0.05);shake(6,15);}
      else{sfxStomp();shake(3,6);emit(boss.rect.cx,boss.rect.cy,8,1,2,12,2,'#ff4040',0.03);}}
    // Guitar attack on boss
    if(player.guitarAtkRect&&player.guitarAtkTimer>0&&boss.rect.hit(player.guitarAtkRect)){
      const killed=boss.hit();
      if(killed){player.score+=500;sfxStomp();stats.bossesKilled++;emit(boss.rect.cx,boss.rect.cy,30,2,5,30,5,'#ffff00',0.08);shake(8,20);}
      else{sfxStomp();shake(5,10);emit(boss.rect.cx,boss.rect.cy,12,1.5,3,18,4,'#ffff00',0.05);}}
    if(player.rect.hit(boss.rect)){
      if(player.vy>0&&player.rect.b-boss.rect.t<22){
        const killed=boss.hit();player.vy=JUMP_FORCE*0.6;
        if(killed){player.score+=500;sfxStomp();stats.bossesKilled++;emit(boss.rect.cx,boss.rect.cy,25,1.5,4,25,4,'#ffd700',0.05);shake(6,15);}
        else{sfxStomp();shake(3,6);}
      }else if(player.invincible<=0){
        player.lives--;sfxHit();shake(5,12);stats.deaths++;stats.enemyDeaths++;
        emit(player.rect.cx,player.rect.cy,10,1,2,15,3,'#ff4040',0.03);
        if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}
        respawn();}}}
  // Lava
  for(const lv of lavaZones)if(player.rect.hit(lv.rect)){
    if(player.invincible<=0){player.lives--;sfxHit();shake(4,10);stats.deaths++;stats.lavaDeaths++;
      emit(player.rect.cx,lv.yt,12,1,3,18,3,'#ff6020',-0.08);
      if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}
      respawn();}break;}
  // Water
  for(const w of waterZones)if(player.rect.hit(w.rect)){
    if(player.invincible<=0){player.lives--;sfxHit();shake(4,10);stats.deaths++;stats.waterDeaths++;
      emit(player.rect.cx,w.yt,10,1,3,15,3,'#60b8ff',-0.08);
      if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}
      respawn();}break;}
  // Fall
  if(player.rect.t>H+100){player.lives--;sfxHit();stats.deaths++;stats.fallDeaths++;
    if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}respawn();}
  // Flag
  if(player.rect.hit(flag.rect)&&(!boss||!boss.alive)){completeLevel();return;}
  stats.maxXReached=Math.max(stats.maxXReached,player.rect.x);
  targetCamX=player.rect.cx-W/3;targetCamX=max(0,targetCamX);camX=lerp(camX,targetCamX,CAM_LERP);
  for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].dead)particles.splice(i,1);}
  if(shakeT>0)shakeT--;else{shakeX=0;shakeY=0;}
}

// ===== GAME DRAW =====
function drawGame(){
  ctx.save();if(shakeT>0)ctx.translate((random()-0.5)*shakeX*2,(random()-0.5)*shakeY*2);
  drawBackground(camX,tick);
  for(const c of clouds)c.draw(camX);
  for(const p of plats)drawPlatform(p,camX,tick);
  for(const w of waterZones)w.draw(camX,tick);
  for(const lv of lavaZones)lv.draw(camX,tick);
  dragon.draw(camX,tick);
  for(const c of coins)c.draw(camX,tick);
  for(const ci of chartItems)ci.draw(camX,tick);
  for(const e of enemies)e.draw(camX,tick);
  if(boss&&boss.alive)boss.draw(camX,tick);
  flag.draw(camX,tick);
  for(const p of particles)p.draw(camX);
  player.draw(camX,tick);
  ctx.restore();
  drawHUD(player,tick);
  drawSlogan();
}

// ===== MAIN LOOP =====
let winSfxPlayed=false;
function loop(){
  if(state==='title'){
    titleAnim+=0.016;drawTitle(titleAnim*60);
    if(anyKey&&playerName){startGame();anyKey=false;winSfxPlayed=false;}
    else if(anyKey&&!playerName){cv.style.display='none';nameContainer.style.display='block';nameInput.value='';nameInput.focus();anyKey=false;}
  }else if(state==='playing'){
    updateGame();if(state==='playing')drawGame();
    else if(state==='levelcomplete'){drawLevelComplete(tick);}
    else{drawGameOver(tick);winSfxPlayed=won;}
  }else if(state==='levelcomplete'){
    completeTimer++;drawLevelComplete(completeTimer);
    if((anyKey&&completeTimer>30)||completeTimer>240){anyKey=false;advanceLevel();}
  }else if(state==='gameover'){
    drawGameOver(tick);tick++;
    if(keys.KeyR){playerName='';state='title';anyKey=false;winSfxPlayed=false;}
    if(keys.KeyQ){state='title';anyKey=false;}
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
